# Kafka Connect Standalone Configuration (Snowflake Sink)
# ========================================================

# Kafka broker (internal Docker network name)
bootstrap.servers=kafka:9092

# Converters
key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=com.snowflake.kafka.connector.records.SnowflakeJsonConverter

# Offset storage (local file for standalone mode)
offset.storage.file.filename=/tmp/connect-offsets-sink.dat
offset.flush.interval.ms=10000

# Plugin path (where connector JARs are located)
plugin.path=/opt/kafka/plugins

# REST API settings
rest.port=8084
rest.host.name=0.0.0.0
