# Snowflake Sink Connector Configuration
# =========================================
# IMPORTANT: Replace all <PLACEHOLDER> values before starting

name=snowflake-sink-connector
connector.class=com.snowflake.kafka.connector.SnowflakeSinkConnector
tasks.max=1

# Kafka topic(s) to consume from
# Use regex to subscribe to ALL topics from poc_db (any collection)
# This matches: mongo.poc_db.orders, mongo.poc_db.customers, etc.
# NOTE: "topics" and "topics.regex" are mutually exclusive — use one or the other
topics.regex=mongo\\.poc_db\\..*

# =========================================
# Snowflake Connection Settings
# =========================================
# REPLACE <ACCOUNT_IDENTIFIER> with your Snowflake account (e.g., abc12345.us-east-1)
snowflake.url.name=swymwjs-ih56791.snowflakecomputing.com:443
snowflake.user.name=KAFKA_CONNECT_USER
snowflake.private.
snowflake.database.name=POC_DB
snowflake.schema.name=MONGO_SYNC
snowflake.role.name=KAFKA_CONNECT_ROLE

# =========================================
# Table Mapping
# =========================================
# Maps Kafka topics to Snowflake table names
# Add a mapping for each collection you want a clean table name for.
# Any unmapped topic auto-creates a table named after the topic
# (e.g., mongo.poc_db.customers → table MONGO_POC_DB_CUSTOMERS)
snowflake.topic2table.map=mongo.poc_db.orders:ORDERS,mongo.poc_db.customers:CUSTOMERS,mongo.poc_db.products:PRODUCTS,mongo.poc_db.inventory:INVENTORY

# =========================================
# Ingestion Method
# =========================================
snowflake.ingestion.method=SNOWPIPE

# =========================================
# Buffer Settings (tuned for POC - flush quickly)
# =========================================
buffer.count.records=10
buffer.flush.time=30
buffer.size.bytes=5000000

# =========================================
# Converter Overrides
# =========================================
key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=com.snowflake.kafka.connector.records.SnowflakeJsonConverter
