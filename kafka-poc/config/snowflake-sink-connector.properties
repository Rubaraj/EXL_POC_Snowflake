# Snowflake Sink Connector Configuration
# =========================================
# IMPORTANT: Replace all <PLACEHOLDER> values before starting

name=snowflake-sink-connector
connector.class=com.snowflake.kafka.connector.SnowflakeSinkConnector
# Increase parallelism for 21+ collections
tasks.max=3

# Kafka topic(s) to consume from
# Use regex to subscribe to ALL topics from poc_db (any collection)
# This matches: mongo.poc_db.orders, mongo.poc_db.customers, etc.
# NOTE: "topics" and "topics.regex" are mutually exclusive — use one or the other
topics.regex=mongo\\.poc_db\\..*

# =========================================
# Snowflake Connection Settings
# =========================================
# REPLACE <ACCOUNT_IDENTIFIER> with your Snowflake account (e.g., abc12345.us-east-1)
snowflake.url.name=swymwjs-ih56791.snowflakecomputing.com:443
snowflake.user.name=KAFKA_CONNECT_USER
snowflake.private.
snowflake.database.name=POC_DB
snowflake.schema.name=MONGO_SYNC
snowflake.role.name=KAFKA_CONNECT_ROLE

# =========================================
# Table Mapping
# =========================================
# Maps Kafka topics to Snowflake table names
# Add a mapping for each collection you want a clean table name for.
# Any unmapped topic auto-creates a table named after the topic
# (e.g., mongo.poc_db.customers → table MONGO_POC_DB_CUSTOMERS)
# ThinkAgent 21 collections + original POC collections
snowflake.topic2table.map=mongo.poc_db.orders:ORDERS,mongo.poc_db.customers:CUSTOMERS,mongo.poc_db.products:PRODUCTS,mongo.poc_db.inventory:INVENTORY,mongo.poc_db.Users:USERS,mongo.poc_db.UserTypes:USER_TYPES,mongo.poc_db.UserTypeMapping:USER_TYPE_MAPPING,mongo.poc_db.BrokerProfiles:BROKER_PROFILES,mongo.poc_db.Leads:LEADS,mongo.poc_db.LeadStatusLookup:LEAD_STATUS_LOOKUP,mongo.poc_db.Enrollments:ENROLLMENTS,mongo.poc_db.EnrollmentStore:ENROLLMENT_STORE,mongo.poc_db.EnrollmentPortfolioStore:ENROLLMENT_PORTFOLIO_STORE,mongo.poc_db.Plans:PLANS,mongo.poc_db.PlanBenefits:PLAN_BENEFITS,mongo.poc_db.PlanZipMapping:PLAN_ZIP_MAPPING,mongo.poc_db.CountyZip:COUNTY_ZIP,mongo.poc_db.Events:EVENTS,mongo.poc_db.LocationMaster:LOCATION_MASTER,mongo.poc_db.Retailers:RETAILERS,mongo.poc_db.SEPMaster:SEP_MASTER,mongo.poc_db.SOA:SOA,mongo.poc_db.EKit:EKIT,mongo.poc_db.LeadProviders:LEAD_PROVIDERS,mongo.poc_db.Notifications:NOTIFICATIONS

# =========================================
# Ingestion Method
# =========================================
snowflake.ingestion.method=SNOWPIPE

# =========================================
# Buffer Settings
# =========================================
# Tuned for bulk ingestion of ~1M documents:
#   - 5000 records per batch (up from 10)
#   - 120s flush interval (up from 30s)
#   - 20MB buffer (up from 5MB)
# For small POC testing, reduce to: 10 records / 30s / 5MB
buffer.count.records=5000
buffer.flush.time=120
buffer.size.bytes=20000000

# =========================================
# Converter Overrides
# =========================================
key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=com.snowflake.kafka.connector.records.SnowflakeJsonConverter
