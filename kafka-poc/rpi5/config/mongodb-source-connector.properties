# MongoDB Source Connector Configuration
# =========================================

name=mongodb-source-connector
connector.class=com.mongodb.kafka.connect.MongoSourceConnector
tasks.max=1

# MongoDB connection (no auth - Docker internal network)
connection.uri=mongodb://mongodb:27017/?replicaSet=rs0

# What to watch — entire database (all collections)
# By removing the "collection" property, the connector watches
# ALL collections in poc_db. Each collection gets its own Kafka topic:
#   poc_db.orders    → mongo.poc_db.orders
#   poc_db.customers → mongo.poc_db.customers
#   poc_db.products  → mongo.poc_db.products
#   (any new collection is auto-detected)
database=poc_db

# Kafka topic prefix
topic.prefix=mongo

# Capture full document on updates (not just the delta)
change.stream.full.document=updateLookup

# Output format
output.format.key=json
output.format.value=json

# Copy existing data on first startup
startup.mode=copy_existing

# Poll settings
poll.max.batch.size=1000
poll.await.time.ms=5000
